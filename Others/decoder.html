<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/images/icon.png" type="image/png">
    <link rel="shortcut icon" href="/images/icon.png" type="image/png">
    <title>NEGIAO工具 - 二维码解码</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #c0a062;
            --bg-color: #dce2e8;
            --card-bg: #fdfbf0;
            --text-main: #2c3e50;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(#bdc3c7 1.5px, transparent 1.5px),
                radial-gradient(#bdc3c7 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            padding-bottom: 3rem;
            line-height: 1.6;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color); 
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color); 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-sub); 
        }

        /* 选中文本颜色 */
        ::selection {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            margin-top: 0;
            position: relative;
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .header {
            text-align: center;
            margin-bottom: 1rem;
            margin-top: 1rem;
            position: relative;
        }

        .header h1 {
            font-family: "Georgia", "Songti SC", "SimSun", serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            position: relative;
            display: inline-block;
        }
        
        .header h1::after {
            content: '';
            display: block;
            width: 220px;
            height: 3px;
            background-color: var(--accent-color);
            margin: 10px auto 0;
            border-radius: 2px;
        }

        .header h1 a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s;
        }

        .header h1 a:hover {
            color: #b45309;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 3.5rem;
            padding-bottom: 20px;
            padding-top: 3.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.18), 0 0 0 1px rgba(0,0,0,0.04);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }

        /* 纯文本特定样式 - 垂直居中 */
        .card.plain-text-mode {
            min-height: 50vh;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            /* 信纸线条：调整为3rem高度以匹配文字行高，颜色使用深色线条 #334155 */
            background-image: linear-gradient(transparent 96%, #efeedc 96%);
            background-size: 100% 3rem;
            background-position: 0 0.6rem;
        }

        .plain-text-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 0;
        }
        
        .card.plain-text-mode .content-text {
            font-family: "Georgia", "Songti SC", "SimSun", serif;
            font-size: 1.5rem;
            color: #1a1a1a;
            line-height: 2;
        }

        .content-text {
            font-size: 1.25rem;
            line-height: 1.8;
            color: var(--text-main);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .vcard-grid {
            display: grid;
            gap: 1.2rem;
        }

        .vcard-item {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }
        
        .vcard-item:last-child {
            border-bottom: 1px solid var(--border-color);
        }
        
        .vcard-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
            border-color: var(--accent-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .vcard-item:active {
            transform: scale(0.98);
        }

        /* 复制按钮 */
        .copy-btn {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--accent-color);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.2s;
            cursor: pointer;
        }

        .vcard-item:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            transform: translateY(-50%) scale(1.1);
        }

        /* 提示框 Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent-color);
            color: var(--bg-color);
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 底部操作栏 */
        .action-bar {
            margin-top: 2.5rem;
            text-align: center;
            animation: fadeIn 1s ease 0.3s backwards;
        }

        .btn-primary {
            background: linear-gradient(135deg, #fbbf24, #d97706);
            color: #fff;
            border: none;
            padding: 1rem 3rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            text-decoration: none;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(251, 191, 36, 0.5);
            filter: brightness(1.1);
        }

        .vcard-icon {
            font-size: 1.4rem;
            color: var(--accent-color);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            flex-shrink: 0;
            border: 1px solid var(--border-color);
        }

        .vcard-content {
            flex: 1;
        }

        .vcard-label {
            font-family: "Times New Roman", "Songti SC", "SimSun", serif;
            font-size: 0.9rem;
            color: var(--accent-color);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .vcard-value {
            font-size: 1.3rem;
            color: var(--text-main);
            font-weight: 500;
            font-family: "Georgia", serif; /* 数字和英文用衬线体更典雅 */
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-sub);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.5;
            color: var(--accent-color);
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        
        .empty-state h2 {
            font-weight: 400;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .visitor-badge-block {
            margin-top: auto;
            padding-top: 0.5rem;
        }

        .visitor-badge-label {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-sub);
            opacity: 0.55;
            margin-bottom: 0;
            letter-spacing: 0.5px;
            font-family: "Microsoft YaHei", sans-serif;
            font-style: italic;
            font-weight: bold;
        }

        .visitor-badge-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 0;
        }

        .visitor-badge-wrap img {
            height: 20px;
            width: auto;
            opacity: 0.92;
        }

        @media (min-width: 800px) {
            .container {
                max-width: 1000px;
            }
        }

        /* 
            @media 是css中用于媒体查询的规则，根据设备特性，应用不同样式
            通过指定应用的最小或者最大宽度，适配不同屏幕尺寸，实现响应式设计
        */
        @media (max-width: 768px) {
            body {
                padding: 15px 20px;
            }
            
            .card {
                padding: 2.8rem;
                border-radius: 12px;
            }
            
            .header {
                margin-bottom: 2rem;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .header h1::after {
                width: 30px;
            }
            
            .card.plain-text-mode {
                min-height: 40vh;
                /* 移动端适配：调整线条间距(2.2rem)和位置，匹配文字行高 */
                background-size: 100% 2.2rem;
                background-position: 0 0.8rem;
            }
            
            .card.plain-text-mode .content-text {
                font-size: 1.1rem;
                line-height: 2.2rem;
            }

            .plain-text-body {
                padding-top: 0.2rem;
            }
            
            .vcard-item {
                padding: 1rem 0.5rem;
                gap: 0.8rem;
            }
            
            .vcard-icon {
                width: 32px;
                height: 32px;
                font-size: 1.1rem;
            }
            
            .vcard-value {
                font-size: 1rem;
                word-break: break-all;
            }
            
            .vcard-item:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><a href="https://negiao-pages.share.connect.posit.cloud/Pages/Note/note-viewer.html?note=qrcode-generator" target="_blank">NEGIAO工具</a></h1>
        </div>

        <div id="content"></div>
        <div id="toast" class="toast">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            已复制到剪贴板
        </div>
    </div>

    <script>
        // 复制功能
        function copyToClipboard(text) {
            if (!text) return;
            
            // 移除HTML标签（如果是链接）
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = text;
            const cleanText = tempDiv.textContent || tempDiv.innerText || text;

            navigator.clipboard.writeText(cleanText).then(() => {
                showToast();
            }).catch(err => {
                // 降级处理
                const textArea = document.createElement("textarea");
                textArea.value = cleanText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand("Copy");
                textArea.remove();
                showToast();
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // vCard (.vcf) 导出已移除（按用户要求）

        // 生成参数摘要（同一组参数 => 同一个 visitor badge id）
        function buildCanonicalParamString() {
            const params = new URLSearchParams(window.location.search);
            const pairs = Array.from(params.entries())
                .map(([key, value]) => [key, value])
                .sort((a, b) => {
                    if (a[0] !== b[0]) {
                        return a[0] < b[0] ? -1 : 1;
                    }
                    return a[1] < b[1] ? -1 : a[1] > b[1] ? 1 : 0;
                });

            if (!pairs.length) {
                return 'empty';
            }

            return pairs
                .map(([key, value]) => `${encodeURIComponent(key)}=${encodeURIComponent(value)}`)
                .join('&');
        }

        // FNV-1a 32-bit hash（快速、稳定、无依赖）
        function hashFNV1a(str) {
            let hash = 0x811c9dc5;
            for (let i = 0; i < str.length; i++) {
                hash ^= str.charCodeAt(i);
                hash = Math.imul(hash, 0x01000193);
            }
            return (hash >>> 0).toString(16).padStart(8, '0');
        }

        function initVisitorBadge() {
            const badgeEl = document.getElementById('visitor-badge');
            if (!badgeEl) {
                return;
            }

            const canonicalParams = buildCanonicalParamString();
            const hash = hashFNV1a(canonicalParams);
            const pageId = `negiao.decoder.${hash}`;

            badgeEl.src = `https://visitor-badge.laobi.icu/badge?page_id=${encodeURIComponent(pageId)}`;
            badgeEl.alt = 'visitor badge';
            badgeEl.title = `badge id: ${pageId}`;
        }

        // 解析URL参数
        function parseUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const config = {};
            
            for (let [key, value] of params.entries()) {
                config[key] = decodeURIComponent(value);
            }
            
            return config;
        }

        // 解析VCard数据
        function parseVCard(vcardStr) {
            try {
                return JSON.parse(vcardStr);
            } catch (e) {
                return null;
            }
        }

        // 自动识别URL并转换为链接
        function linkify(text) {
            const urlRegex = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            return text.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank" style="color: var(--accent-color); text-decoration: none; border-bottom: 1px solid var(--accent-color); transition: opacity 0.2s; opacity: 0.9;">${url}</a>`;
            });
        }

        // 渲染VCard
        function renderVCard(vcard) {
            const iconMap = {
                'name': '👤',
                'title': '💼',
                'company': '🏢',
                'tel': '📱',
                'email': '📧',
                'wechat': '💬',
                'qq': '🐧',
                'alipay': '💳',
                'website': '🌐',
                'address': '📍',
                'note': '📝'
            };

            const labelMap = {
                'name': '姓名',
                'title': '职位',
                'company': '公司',
                'tel': '电话',
                'email': '邮箱',
                'wechat': '微信',
                'qq': 'QQ',
                'alipay': '支付宝',
                'website': '网站',
                'address': '地址',
                'note': '备注'
            };

            let html = '<div class="vcard-grid">';
            let hasContent = false;
            
            for (let [key, value] of Object.entries(vcard)) {
                // 只显示有值的字段
                if (value && value.trim && value.trim() !== '') {
                    hasContent = true;
                    
                    let displayValue = value;
                    // 如果是网站字段，或者内容看起来像URL，则转换为链接
                    if (key === 'website' || (typeof value === 'string' && value.match(/^https?:\/\//))) {
                        displayValue = `<a href="${value}" target="_blank" style="color: var(--accent-color); text-decoration: none; border-bottom: 1px solid var(--accent-color);">${value}</a>`;
                    }
                    
                    // 转义单引号以防止JS错误
                    const safeValue = value.replace(/'/g, "\\'");
                    
                    html += `
                        <div class="vcard-item" onclick="copyToClipboard('${safeValue}')">
                            <span class="vcard-icon">${iconMap[key] || '📋'}</span>
                            <div class="vcard-content">
                                <div class="vcard-label">${labelMap[key] || key}</div>
                                <div class="vcard-value">${displayValue}</div>
                            </div>
                            <button class="copy-btn" title="复制">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                        </div>
                    `;
                }
            }
            html += '</div>';
            
            // 如果没有任何有效内容，返回空字符串
            return hasContent ? html : '';
        }

        // 渲染页面
        function renderPage() {
            const config = parseUrlParams();
            const contentDiv = document.getElementById('content');
            const badgeInnerHtml = `
                <div class="visitor-badge-block">
                    <div class="visitor-badge-label">本链接访问次数</div>
                    <div class="visitor-badge-wrap">
                        <img id="visitor-badge" src="" alt="visitor badge" />
                    </div>
                </div>
            `;

            // 检查是否有有效数据
            if (!config.content && !config.vcard) {
                contentDiv.innerHTML = `
                    <div class="card">
                        ${badgeInnerHtml}
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <h2>暂无信息</h2>
                            <p>未检测到有效的数据参数</p>
                        </div>
                    </div>
                `;
                return;
            }

            let contentHtml = '';
            let isPlainText = false;

            // 优先显示VCard数据（联系方式）
            if (config.vcard) {
                const vcard = parseVCard(config.vcard);
                if (vcard && Object.keys(vcard).length > 0) {
                    contentHtml = renderVCard(vcard);
                    // 已移除 “保存联系人（.vcf）” 按钮（按产品需求）
                } else if (config.content) {
                    // 如果vcard解析失败，尝试显示content
                    const safeContent = config.content.replace(/'/g, "\\'");
                    contentHtml = `
                        <div style="position: relative;">
                            <div class="content-text">${linkify(config.content)}</div>
                            <button class="copy-btn" onclick="copyToClipboard('${safeContent}')" title="复制" style="opacity: 1; top: 0; right: 0; background: rgba(0,0,0,0.05);">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                        </div>`;
                    isPlainText = true;
                }
            } 
            // 显示普通文本内容
            else if (config.content) {
                const safeContent = config.content.replace(/'/g, "\\'");
                contentHtml = `
                    <div style="position: relative;">
                        <div class="content-text">${linkify(config.content)}</div>
                        <button class="copy-btn" onclick="copyToClipboard('${safeContent}')" title="复制" style="opacity: 1; top: 0; right: 0; background: rgba(0,0,0,0.05);">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>`;
                isPlainText = true;
            }

            const cardClass = isPlainText ? 'card plain-text-mode' : 'card';
            const finalContentHtml = isPlainText
                ? `<div class="plain-text-body">${contentHtml}</div>`
                : contentHtml;
            contentDiv.innerHTML = `<div class="${cardClass}">${finalContentHtml}${badgeInnerHtml}</div>`;
        }

        // 页面加载时执行
        window.addEventListener('DOMContentLoaded', () => {
            renderPage();
            initVisitorBadge();
        });
    </script>

    <!-- 访问统计脚本（延迟加载，仅控制台输出，不修改 DOM） -->

                    supabaseScript.onload = async function() {
                        try {
                            const SB_URL = 'https://zifovhnylhlwnviiilbo.supabase.co';
                            const SB_KEY = 'sb_publishable_oMMXVnMuHW0JCYASt4hpcQ_X8d65i0l';
                            const client = supabase.createClient(SB_URL, SB_KEY);

                            const path = window.location.pathname;

                            // 获取公网 IP（可失败，但不阻塞主流程）

                                userIP = ipJson.ip;
                            } catch (e) {
                                console.log('无法获取公网IP，统计中将缺少 IP 信息：', e);
                            }

                            // 记录一次访问（不会覆盖现有数据）
                            try {
                                await client.from('page_views').insert([{ page_url: path, visitor_ip: userIP }]);
                                console.log('Supabase: 已成功插入访问记录。');
                            } catch (err) {
                                console.log('Supabase 插入记录失败：', err);
                            }

                            // 统计：总 PV
                            let totalCount = null;
                            try {
                                const res = await client.from('page_views').select('*', { count: 'exact', head: true }).eq('page_url', path);
                                totalCount = res && res.count != null ? res.count : null;
                                console.log('Supabase: 查询总 PV 完成。');
                            } catch (err) {
                                console.log('Supabase 查询总 PV 失败：', err);
                            }

                            // 统计：当前 IP 今天的访问次数（若有 IP）
                            let todayCount = null;
                            if (userIP) {
                                try {
                                    const today = new Date(); today.setHours(0,0,0,0);
                                    const todayISO = today.toISOString();
                                    const res = await client.from('page_views').select('*', { count: 'exact', head: true })
                                        .eq('page_url', path).eq('visitor_ip', userIP).gte('created_at', todayISO);
                                    todayCount = res && res.count != null ? res.count : null;
                                    console.log('Supabase: 查询 IP 当日访问次数完成。');
                                } catch (err) {
                                    console.log('Supabase 查询 IP 当日访问次数失败：', err);
                                }
                            }

                            console.log('【页面访问统计】', {
                                path,
                                total_pv: totalCount !== null ? totalCount : 'unknown',
                                today_ip_visits: userIP ? (todayCount !== null ? todayCount : 'unknown') : 'ip-unavailable'
                            });

                        } catch (err) {
                            console.log('统计脚本执行错误：', err);
                        }
                    };

                    supabaseScript.onerror = function(e) {
                        console.log('Supabase 脚本加载失败或被阻止：', e);
                    };

                    document.head.appendChild(supabaseScript);
                } catch (e) {
                    console.log('尝试加载 Supabase SDK 失败：', e);
                }

                // Google Analytics（动态加载）
                try {
                    const gaScript = document.createElement('script');
                    gaScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-KYJ7Y4LE2N';
                    gaScript.async = true;
                    gaScript.onload = function() {
                        try {
                            window.dataLayer = window.dataLayer || [];
                            function gtag(){ dataLayer.push(arguments); }
                            gtag('js', new Date());
                            gtag('config', 'G-KYJ7Y4LE2N');
                            console.log('Google Analytics 加载成功。');
                        } catch (e) {
                            console.log('Google Analytics 初始化失败：', e);
                        }
                    };
                    gaScript.onerror = function(e) {
                        console.log('Google Analytics 加载失败或被阻止：', e);
                    };
                    document.head.appendChild(gaScript);
                } catch (e) {
                    console.log('尝试加载 Google Analytics 失败：', e);
                }

                // 51.la 国内脚本（延迟加载）
                try {
                    (function() {
                        var s = document.createElement('script');
                        s.type = 'text/javascript';
                        s.src = '//js.users.51.la/22001749.js';
                        s.async = true;
                        s.onload = function() {
                            console.log('51.la 统计脚本已加载。');
                        };
                        s.onerror = function(e) {
                            console.log('51.la 脚本加载失败：', e);
                        };
                        document.body.appendChild(s);
                    })();
                } catch (err) {
                    console.log('载入 51.la 统计脚本时发生错误：', err);
                }

            }, 3000);
        });
    </script>
