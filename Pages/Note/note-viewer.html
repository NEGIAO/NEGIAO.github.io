        (function () {

                },
                'ZhouDi_learning/word-learning-record': {

                },
                'ArcPy': {
                    title: 'ArcPyеӯҰд№ з¬”и®°',
                    description: 'ArcPyеӯҰд№ з¬”и®° - ж¶өзӣ–ArcGIS PythonиҮӘеҠЁеҢ–еӨ„зҗҶгҖҒең°зҗҶеӨ„зҗҶе·Ҙе…·зӯүеҶ…е®№гҖӮ'
                },
                'gee-coursework': {
                    title: 'GEEз»“иҜҫдҪңдёҡ',
                    description: 'Google Earth EngineиҜҫзЁӢз»“иҜҫдҪңдёҡд»Јз ҒгҖӮ'
                },
                'spatial-analysis-R': {
                    title: 'жңәеҷЁеӯҰд№ дёҺжҷәиғҪз®—жі•пјҲRпјү',

                'ml-dl-learning': {

                },
                'arcgis-engine': {

                    description: 'ArcGIS EngineејҖеҸ‘е®һи·өпјҢеҢ…жӢ¬ең°еӣҫжҺ§д»¶гҖҒз©әй—ҙеҲҶжһҗзӯүеҠҹиғҪзҡ„е®һзҺ°гҖӮ'
                },

                    title: 'ArcGIS Engine Project',
                    description: 'еҹәдәҺArcGIS Engine 10.2.2зҡ„жЎҢйқўGISзі»з»ҹејҖеҸ‘йЎ№зӣ®гҖӮ'
                },
                'negiao-toolbox': {
                    title: 'NEGIAOе·Ҙе…·з®ұ',
                    description: 'ArcGIS ProиҮӘе®ҡд№үе·Ҙе…·з®ұ(.atbx)пјҢеҢ…еҗ«еёёз”Ёең°зҗҶеӨ„зҗҶи„ҡжң¬дёҺж•ҲзҺҮе·Ҙе…·гҖӮ'
                },
                'qrcode-generator': {
                    title: 'дәҢз»ҙз Ғз”ҹжҲҗеҷЁ',
                    description: 'еҹәдәҺйқўеҗ‘еҜ№иұЎи®ҫи®Ўзҡ„дәҢз»ҙз Ғз”ҹжҲҗеҷЁпјҢж”ҜжҢҒиҮӘе®ҡд№үж ·ејҸгҖҒеӣҫж Үе’Ңж•°жҚ®URLзј–з ҒгҖӮ'
                },
                'note-template': {
                    title: 'з¬”и®°жЁЎжқҝ',
                    description: 'з”ЁдәҺеҲӣе»әж–°з¬”и®°зҡ„ж ҮеҮҶжЁЎжқҝпјҢеҢ…еҗ«MarkdownжёІжҹ“е’Ңз« иҠӮзҙўеј•еҠҹиғҪгҖӮ'
                },
                'calculus-key-points': {
                    title: 'еҫ®з§ҜеҲҶйҮҚиҰҒз»“и®әдёҺзҹҘиҜҶзӮ№',
                    description: 'з”ЁдәҺж—Ҙеёёжӣҙж–°е’ҢеӨҚд№ зҡ„еҫ®з§ҜеҲҶйҖҹжҹҘз¬”и®°пјҢж”ҜжҢҒеӨҚжқӮж•°еӯҰе…¬ејҸжёІжҹ“гҖӮ'
                }
            };

            // иҺ·еҸ–URLеҸӮж•°
            function getUrlParam(name) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(name);
            }

            // жӣҙж–°йЎөйқўе…ғдҝЎжҒҜ
            function updatePageMeta(noteName, config) {
                if (config) {
                    document.getElementById('page-title').textContent = config.title + ' - NEGIAO';
                    document.title = config.title + ' - NEGIAO';

                    // жӣҙж–°metaж Үзӯҫ
                    const metaDesc = document.querySelector('meta[name="description"]');
                    if (metaDesc && config.description) {
                        metaDesc.setAttribute('content', config.description);
                    }
                }
            }

            // жҳҫзӨәй”ҷиҜҜ
            function showError(message) {
                const container = document.getElementById('note-content');
                container.innerHTML = `
                    <div class="error-container">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h2>еҠ иҪҪеӨұиҙҘ</h2>
                        <p>${message}</p>
                        <a href="../notes.html" class="btn btn--primary" style="margin-top: 1rem;">иҝ”еӣһз¬”и®°еҲ—иЎЁ</a>
                    </div>
                `;
            }

            // еҠ иҪҪMarkdownж–Үд»¶
            async function loadMarkdown(noteName) {
                const mdPath = `./md/${noteName}.md`;

                try {
                    const response = await fetch(mdPath);
                    if (!response.ok) {
                        throw new Error(`ж— жі•еҠ иҪҪз¬”и®°ж–Үд»¶: ${mdPath}`);
                    }
                    return await response.text();
                } catch (error) {
                    throw new Error(`еҠ иҪҪеӨұиҙҘ: ${error.message}`);
                }
            }

            // жёІжҹ“Markdown
            function renderMarkdown(md, container, noteName) {
                return new Promise((resolve, reject) => {
                    let retryCount = 0;
                    const maxRetries = 60;

                    function tryRender() {
                        if (window.marked) {
                            try {
                                // жЈҖжҹҘжҳҜеҗҰжҳҜеҚ•иҜҚеӯҰд№ и®°еҪ•пјҢйңҖиҰҒеҖ’еәҸжҳҫзӨә
                                if (noteName && noteName.includes('word-learning-record')) {
                                    container.innerHTML = '';
                                    container.classList.add('animate-in');
                                    
                                    // жҢүжңҲд»ҪеҲҶеүІ (## )
                                    const rawChunks = md.split(/\n(?=##\s)/);
                                    
                                    if (rawChunks.length < 1) {
                                        container.innerHTML = window.marked.parse(md);
                                        resolve();
                                        return;
                                    }
                                    
                                    const headerChunk = rawChunks[0]; // йЎөйқўж Үйўҳе’Ңз®Җд»Ӣ
                                    const monthChunks = rawChunks.slice(1); // еҗ„дёӘжңҲд»Ҫзҡ„ж•°жҚ®еқ—
                                    
                                    // жҸҗеҸ–жүҖжңү"еӨ©"зҡ„и®°еҪ•
                                    let allDays = [];
                                    monthChunks.forEach(monthChunk => {
                                        const dayParts = monthChunk.split(/\n(?=###\s)/);
                                        if (dayParts.length > 1) {
                                            allDays.push(...dayParts.slice(1));
                                        }
                                    });
                                    
                                    // жҢүж—ҘжңҹеҖ’еәҸжҺ’еәҸ
                                    const getDate = (chunk) => {
                                        const match = chunk.match(/###\s+(\d{4}-\d{2}-\d{2})/);
                                        return match ? new Date(match[1]) : new Date(0);
                                    };
                                    
                                    allDays.sort((a, b) => getDate(b) - getDate(a));
                                    
                                    // жёІжҹ“еӨҙйғЁ
                                    const headerDiv = document.createElement('div');
                                    headerDiv.className = 'note-chunk header-chunk';
                                    headerDiv.innerHTML = window.marked.parse(headerChunk);
                                    container.appendChild(headerDiv);
                                    
                                    // жёІжҹ“жүҖжңүж—Ҙжңҹи®°еҪ•пјҲе·ІеҖ’еәҸпјү
                                    const contentDiv = document.createElement('div');
                                    contentDiv.className = 'note-chunk days-content';
                                    contentDiv.innerHTML = window.marked.parse(allDays.join('\n'));
                                    container.appendChild(contentDiv);
                                    
                                } else {
                                    // е…¶д»–з¬”и®°жӯЈеёёжёІжҹ“
                                    container.innerHTML = window.marked.parse(md);
                                    container.classList.add('animate-in');
                                }
                                resolve();
                            } catch (e) {
                                reject(e);
                            }
                        } else if (retryCount < maxRetries) {
                            retryCount++;
                            setTimeout(tryRender, 50);
                        } else {
                            reject(new Error('Markdownи§ЈжһҗеҷЁеҠ иҪҪи¶…ж—¶'));
                        }
                    }

                    tryRender();
                });
            }

            // еә”з”Ёд»Јз Ғй«ҳдә®
            function applyHighlight(container) {
                if (window.hljs) {
                    container.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightBlock(block);
                    });
                } else {
                    // зӯүеҫ…highlight.jsеҠ иҪҪ
                    window.addEventListener('load', function () {
                        if (typeof hljs !== 'undefined') {
                            container.querySelectorAll('pre code').forEach((block) => {
                                hljs.highlightBlock(block);
                            });
                        }
                    });
                }
            }

            // жёІжҹ“ж•°еӯҰе…¬ејҸпјҲж”ҜжҢҒеӨҚжқӮLaTeXпјү
            function renderMath(container) {
                return new Promise((resolve) => {
                    let retryCount = 0;
                    const maxRetries = 80;

                    function tryTypeset() {
                        if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
                            window.MathJax.typesetPromise([container])
                                .then(function () {
                                    resolve();
                                })
                                .catch(function () {
                                    resolve();
                                });
                            return;
                        }

                        if (retryCount < maxRetries) {
                            retryCount++;
                            setTimeout(tryTypeset, 50);
                        } else {
                            resolve();
                        }
                    }

                    tryTypeset();
                });
            }

            // дё»еҮҪж•°
            async function init() {
                const noteName = getUrlParam('note');

                if (!noteName) {
                    showError('жңӘжҢҮе®ҡз¬”и®°еҗҚз§°гҖӮиҜ·дҪҝз”Ё ?note=з¬”и®°еҗҚ еҸӮж•°и®ҝй—®гҖӮ');
                    return;
                }

                // жӣҙж–°йЎөйқўдҝЎжҒҜ
                const config = noteConfig[noteName];
                updatePageMeta(noteName, config);

                try {
                    // еҠ иҪҪMarkdown
                    const md = await loadMarkdown(noteName);

                    // жёІжҹ“
                    const container = document.getElementById('note-content');
                    await renderMarkdown(md, container, noteName);

                    // жһ„е»әзӣ®еҪ•
                    if (window.buildNoteTOC) {
                        requestAnimationFrame(function () {
                            window.buildNoteTOC();
                        });
                    }

                    // д»Јз Ғй«ҳдә®
                    applyHighlight(container);

                    // ж•°еӯҰе…¬ејҸжёІжҹ“
                    await renderMath(container);

                    // еҚ•иҜҚеӯҰд№ зұ»з¬”и®°пјҡдёӯж–ҮйҮҠд№үйҒ®жҢЎеҠҹиғҪ
                    if (window.initChineseMeaningMasking && noteName.includes('word-learning-record')) {
                        window.initChineseMeaningMasking({
                            container: container
                        });
                    }

                } catch (error) {
                    showError(error.message);
                }
            }

            // зӯүеҫ…DOMеҠ иҪҪе®ҢжҲҗ
            document.addEventListener('DOMContentLoaded', init);
        })();

        // TOCеҲҮжҚўеҠҹиғҪ
        function initTocToggle() {
            const toc = document.querySelector('.note-toc');
            const toggleBtn = document.getElementById('toc-toggle-btn');
            if (!toggleBtn) return;

            const icon = toggleBtn.querySelector('i');

            // жЈҖжҹҘlocalStorageдёӯдҝқеӯҳзҡ„зҠ¶жҖҒ
            const isHidden = localStorage.getItem('toc-hidden') === 'true';

            // еҲқе§ӢзҠ¶жҖҒ
            if (isHidden) {
                toc.classList.add('note-toc--hidden');
                icon.classList.remove('fa-times');
                icon.classList.add('fa-list');
            } else {
                icon.classList.remove('fa-list');
                icon.classList.add('fa-times');
            }

            // з§»еҠЁз«ҜдјҳеҢ–
            const isMobile = window.innerWidth <= 768;
            const eventType = isMobile ? 'touchstart' : 'click';

            toggleBtn.addEventListener(eventType, (e) => {
                if (isMobile && e.type === 'touchstart') {
                    e.preventDefault();
                }

                toc.classList.toggle('note-toc--hidden');

                if (toc.classList.contains('note-toc--hidden')) {
                    icon.classList.remove('fa-times');
                    icon.classList.add('fa-list');
                    localStorage.setItem('toc-hidden', 'true');
                } else {
                    icon.classList.remove('fa-list');
                    icon.classList.add('fa-times');
                    localStorage.setItem('toc-hidden', 'false');
                }
            }, { passive: isMobile ? false : true });
        }

        document.addEventListener('DOMContentLoaded', initTocToggle);
    </script>
</body>

</html>
