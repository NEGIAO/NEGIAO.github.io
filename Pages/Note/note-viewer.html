<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NEGIAO的技术笔记">
    <meta name="author" content="NEGIAO">
    <meta name="theme-color" content="#0D1117">

    <!-- DNS Prefetch & Preconnect -->
    <link rel="preconnect" href="https://cdnjs.loli.net" crossorigin>
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">

    <title id="page-title">笔记 - NEGIAO</title>
    <link rel="icon" type="image/webp" href="/images/icon.webp">
    <link rel="shortcut icon" type="image/webp" href="/images/icon.webp">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="./note-viewer.css">
    <link rel="stylesheet" href="https://cdnjs.loli.net/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.loli.net/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script defer src="https://cdnjs.loli.net/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script defer src="../notes-toc.js"></script>
    <script defer src="../main-enhanced.js"></script>
    <script defer src="./chinese-meaning-mask.js"></script>
    <script defer src="https://cdnjs.loli.net/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                packages: { '[+]': ['ams'] },
                macros: {
                    dd: '\\,\\mathrm{d}',
                    e: '\\mathrm{e}'
                }
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            }
        };
    </script>
    <script defer id="MathJax-script" src="https://cdnjs.loli.net/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
    <script defer src="/Pages/i18n-toggle.js"></script>
    <script defer src="./note-viewer.js"></script>
</head>

<body class="note-viewer-page">
    <nav class="navbar">
        <div class="navbar__container">
            <a href="../../index.html" class="navbar__brand">NEGIAO</a>
            <a href="../notes.html" class="btn btn--secondary note-back-btn">返回索引</a>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换主题" title="切换主题">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <main class="container section note-layout">
        <button id="toc-toggle-btn" class="toc-toggle-btn" aria-label="Toggle Table of Contents">
            <i class="fas fa-list"></i>
        </button>

        <aside class="note-toc card" aria-label="文章章节目录">
            <nav class="note-toc__nav" id="note-toc"></nav>
        </aside>

        <article class="note-content card">
            <div class="note-search-container">
                <input type="text" id="note-search" class="note-search-input" placeholder="在笔记内搜索...">
                <div class="note-search-nav">
                    <button id="note-search-prev" class="note-search-nav-btn" title="上一个结果" disabled>
                        <i class="fas fa-chevron-up"></i>
                    </button>
                    <button id="note-search-next" class="note-search-nav-btn" title="下一个结果" disabled>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <span id="note-search-count" class="note-search-count"></span>
                </div>
            </div>

            <div id="note-content">
                <div class="loading-container">
                    <div class="skeleton-screen">
                        <div class="skeleton-item skeleton-title"></div>
                        <div class="skeleton-item skeleton-subtitle"></div>
                        <div class="skeleton-item skeleton-paragraph" style="width: 95%;"></div>
                        <div class="skeleton-item skeleton-paragraph" style="width: 88%;"></div>
                        <div class="skeleton-item skeleton-paragraph" style="width: 92%;"></div>
                        <div class="skeleton-item skeleton-paragraph" style="width: 85%;"></div>
                    </div>
                    <p class="loading-text">正在加载笔记内容...</p>
                </div>
            </div>
        </article>
    </main>
</body>

</html>
